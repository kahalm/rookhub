###############################################################################
# RookHub full-stack mit Gluetun VPN (WireGuard)
#
#   docker compose -f compose.vpn.yml --env-file .env.vpn up --build
###############################################################################

services:

  # ── Shared MariaDB ─────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: rookhub-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD must be set}
      CRAWLER_DB_NAME: ${CRAWLER_DB_NAME}
      CRAWLER_DB_USER: ${CRAWLER_DB_USER}
      CRAWLER_DB_PASSWORD: ${CRAWLER_DB_PASSWORD}
      ROOKHUB_DB_NAME: ${ROOKHUB_DB_NAME}
      ROOKHUB_DB_USER: ${ROOKHUB_DB_USER}
      ROOKHUB_DB_PASSWORD: ${ROOKHUB_DB_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rookhub

  # ── Gluetun VPN (WireGuard) ───────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun
    container_name: rookhub-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER}
      VPN_TYPE: ${VPN_TYPE}
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY:?WIREGUARD_PRIVATE_KEY must be set}
      WIREGUARD_PRESHARED_KEY: ${WIREGUARD_PRESHARED_KEY}
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES:?WIREGUARD_ADDRESSES must be set}
      SERVER_COUNTRIES: ${SERVER_COUNTRIES}
      FIREWALL_VPN_INPUT_PORTS: ${FIREWALL_VPN_INPUT_PORTS}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9999 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rookhub

  # ── ChessResults Crawler (via Gluetun VPN) ────────────────────────────────
  crawler:
    build:
      context: ../chessresults_crawler/src/ChessResultsCrawler
      dockerfile: Dockerfile
    container_name: rookhub-crawler
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    network_mode: "service:gluetun"
    depends_on:
      mariadb:
        condition: service_healthy
      gluetun:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=mariadb;Port=3306;Database=${CRAWLER_DB_NAME};User=${CRAWLER_DB_USER};Password=${CRAWLER_DB_PASSWORD};"
      API_KEY: ${CRAWLER_API_KEY}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Elasticsearch__Url: http://elasticsearch:9200

  # ── RookHub API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./src/api/RookHub.Api
      dockerfile: Dockerfile
    container_name: rookhub-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    ports:
      - "${API_PORT}:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      gluetun:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=mariadb;Port=3306;Database=${ROOKHUB_DB_NAME};User=${ROOKHUB_DB_USER};Password=${ROOKHUB_DB_PASSWORD};"
      Jwt__Key: ${JWT_KEY:?JWT_KEY must be set}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Crawler__BaseUrl: http://gluetun:8080
      Crawler__ApiKey: ${CRAWLER_API_KEY}
      Discord__LinkSecret: ${DISCORD_LINK_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Elasticsearch__Url: http://elasticsearch:9200
      Kibana__Url: ${KIBANA_URL:-}
      SchachBot__WebhookUrl: ${SCHACH_BOT_WEBHOOK_URL:-}
      SchachBot__WebhookSecret: ${SCHACH_BOT_WEBHOOK_SECRET:-}
      SchachBot__StatsSecret: ${SCHACH_BOT_STATS_SECRET:-}
      # Basis-URL des Frontends fuer Links in E-Mails (z.B. Passwort-Reset).
      App__BaseUrl: ${APP_BASE_URL:-}
      # E-Mail-Versand (Passwort-Reset). SmtpHost leer -> Versand aus (Mail wird nur geloggt).
      Email__SmtpHost: ${EMAIL_SMTP_HOST:-}
      Email__SmtpPort: ${EMAIL_SMTP_PORT:-587}
      Email__SmtpUser: ${EMAIL_SMTP_USER:-}
      Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD:-}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-}
      Email__FromName: ${EMAIL_FROM_NAME:-RookHub}
      Email__UseStartTls: ${EMAIL_USE_STARTTLS:-true}
      # Chessable-Integration (piratechess-API im externen chessable-bridge Netz).
      Chessable__ApiUrl: ${CHESSABLE_API_URL:-http://piratechess-api:8080}
      Chessable__ServiceKey: ${CHESSABLE_SERVICE_KEY:-}
      Encryption__Key: ${ENCRYPTION_KEY:-}
    volumes:
      - dataprotection-keys:/keys
    networks:
      - rookhub
      - chessable-bridge

  # ── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: rookhub-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=rookhub-logs
      - cluster.routing.allocation.disk.threshold_enabled=false
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rookhub

  # ── Kibana ────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: rookhub-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - rookhub

  # ── Kibana Data Views Init (idle sidecar — bleibt running fuer Arcane) ────
  kibana-init:
    build:
      context: .
      dockerfile: kibana-init/Dockerfile
    container_name: rookhub-kibana-init
    restart: unless-stopped
    depends_on:
      kibana:
        condition: service_healthy
    # Image backt init-kibana.sh ein -> Dashboard wandert bei `up -d --build` automatisch mit
    # (Script-Aenderung -> neues Image -> Recreate -> Re-Import, idempotent via overwrite=true).
    networks:
      - rookhub

  # ── Frontend (Angular + nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: rookhub-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "${FRONTEND_PORT}:8080"
    depends_on:
      - api
    networks:
      - rookhub

networks:
  rookhub:
  # Externes Netz, das von piratechess_docker bereitgestellt wird, damit
  # rookhub-api den piratechess-api Container per DNS-Namen erreicht.
  chessable-bridge:
    external: true
    name: chessable-bridge

volumes:
  mariadb-data:
  es-data:
  dataprotection-keys:
