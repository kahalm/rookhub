###############################################################################
# RookHub full-stack deployment mit Gluetun VPN (WireGuard) – Dev-Variante
#
# Nutzt pre-built Images (ghcr.io) statt lokalem Build.
#
# 1. Create .env.dev.vpn (see below) and adjust values
# 2. Start:  docker compose -f compose.dev.vpn.yml --env-file .env.dev.vpn up -d
#
# Required .env variables (no defaults – all must be set explicitly):
#   MARIADB_ROOT_PASSWORD=
#   DB_EXTERNAL_PORT=
#   CRAWLER_DB_NAME=
#   CRAWLER_DB_USER=
#   CRAWLER_DB_PASSWORD=
#   ROOKHUB_DB_NAME=
#   ROOKHUB_DB_USER=
#   ROOKHUB_DB_PASSWORD=
#   JWT_KEY=<min-32-char-secret-for-jwt-signing>
#   JWT_ISSUER=
#   JWT_AUDIENCE=
#   FRONTEND_PORT=
#   API_PORT=
#   DB_DATA_PATH=
#   INIT_DB_PATH=
#   ES_DATA_PATH=
#   CRAWLER_API_KEY=
#   ADMIN_USERNAME=
#   ADMIN_PASSWORD=
#   ASPNETCORE_ENVIRONMENT=
#   VPN_SERVICE_PROVIDER=
#   VPN_TYPE=
#   WIREGUARD_PRIVATE_KEY=
#   WIREGUARD_PRESHARED_KEY=
#   WIREGUARD_ADDRESSES=
#   SERVER_COUNTRIES=
#   FIREWALL_VPN_INPUT_PORTS=
# Optional (Default in Klammern):
#   ES_PORT=      (9201)
#   KIBANA_PORT=  (5602)
#
# WICHTIG bei parallelem Betrieb mit dem Prod-Stack (compose.vpn.yml) auf demselben
# Host: ALLE Host-Ports UND alle Bind-Pfade muessen sich vom Prod-Stack unterscheiden,
# sonst kollidieren Ports bzw. das ES-Datenverzeichnis (node.lock). Dev-Konvention:
# Ports 5002/8087/3309/9201/5602, Bind-Pfade unter /srv/config/rookhub-dev/.
# Siehe .env.dev.vpn.example.
#
# Ports:
#   ${FRONTEND_PORT}     -> Frontend (nginx)
#   ${API_PORT}          -> RookHub API
#   ${DB_EXTERNAL_PORT}  -> MariaDB
#   ${ES_PORT:-9201}     -> Elasticsearch
#   ${KIBANA_PORT:-5602} -> Kibana
###############################################################################

services:

  # ── Shared MariaDB ─────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: rookhub-mariadb-dev
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      CRAWLER_DB_NAME: ${CRAWLER_DB_NAME}
      CRAWLER_DB_USER: ${CRAWLER_DB_USER}
      CRAWLER_DB_PASSWORD: ${CRAWLER_DB_PASSWORD}
      ROOKHUB_DB_NAME: ${ROOKHUB_DB_NAME}
      ROOKHUB_DB_USER: ${ROOKHUB_DB_USER}
      ROOKHUB_DB_PASSWORD: ${ROOKHUB_DB_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT}:3306"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/mysql
      - ${INIT_DB_PATH}:/docker-entrypoint-initdb.d/init-db.sh:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rookhub-dev

  # ── Gluetun VPN (WireGuard) ───────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun
    container_name: rookhub-gluetun-dev
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER}
      VPN_TYPE: ${VPN_TYPE}
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      WIREGUARD_PRESHARED_KEY: ${WIREGUARD_PRESHARED_KEY}
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES}
      SERVER_COUNTRIES: ${SERVER_COUNTRIES}
      FIREWALL_VPN_INPUT_PORTS: ${FIREWALL_VPN_INPUT_PORTS}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9999 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rookhub-dev

  # ── ChessResults Crawler (via Gluetun VPN) ────────────────────────────────
  crawler:
    image: ghcr.io/kahalm/rookhub-crawler:dev
    container_name: rookhub-crawler-dev
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      mariadb:
        condition: service_healthy
      gluetun:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=mariadb;Port=3306;Database=${CRAWLER_DB_NAME};User=${CRAWLER_DB_USER};Password=${CRAWLER_DB_PASSWORD};"
      API_KEY: ${CRAWLER_API_KEY}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Elasticsearch__Url: http://elasticsearch:9200

  # ── RookHub API ────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/kahalm/rookhub-api:dev
    container_name: rookhub-api-dev
    restart: unless-stopped
    ports:
      - "${API_PORT}:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      gluetun:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=mariadb;Port=3306;Database=${ROOKHUB_DB_NAME};User=${ROOKHUB_DB_USER};Password=${ROOKHUB_DB_PASSWORD};"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Crawler__BaseUrl: http://gluetun:8080
      Crawler__ApiKey: ${CRAWLER_API_KEY}
      Discord__LinkSecret: ${DISCORD_LINK_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Elasticsearch__Url: http://elasticsearch:9200
    volumes:
      - dataprotection-keys:/keys
    networks:
      - rookhub-dev

  # ── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: rookhub-elasticsearch-dev
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=rookhub-logs
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "${ES_PORT:-9201}:9200"
    volumes:
      - ${ES_DATA_PATH}:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rookhub-dev

  # ── Kibana ────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: rookhub-kibana-dev
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "${KIBANA_PORT:-5602}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - rookhub-dev

  # ── Kibana Data Views Init (idle sidecar — bleibt running fuer Arcane) ────
  kibana-init:
    image: curlimages/curl:latest
    container_name: rookhub-kibana-init-dev
    restart: unless-stopped
    depends_on:
      kibana:
        condition: service_healthy
    volumes:
      - ./init-kibana.sh:/init-kibana.sh:ro
    # Init laeuft bei jedem Start (idempotent), danach idle -> Container bleibt "running"
    entrypoint: ["/bin/sh", "-c", "/init-kibana.sh; echo 'init done, idling'; exec tail -f /dev/null"]
    networks:
      - rookhub-dev

  # ── Frontend (Angular + nginx) ─────────────────────────────────────────────
  frontend:
    image: ghcr.io/kahalm/rookhub-frontend:dev
    container_name: rookhub-frontend-dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:8080"
    depends_on:
      - api
    networks:
      - rookhub-dev

networks:
  rookhub-dev:

volumes:
  dataprotection-keys:
