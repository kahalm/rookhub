name: Build Android TWA (AAB)

# Manuell ausgelöst: baut aus twa/twa-manifest{,.dev}.json einen signierten Android
# App Bundle (AAB) + APK und lädt ihn als Artefakt hoch.
#
# Für die 'prod'-Variante wird die frische APK/AAB ZUSÄTZLICH an ein GitHub-Release
# `v<APP_VERSION>` gehängt und als "latest" markiert — damit der /install-Download-Link
# (releases/latest/download/app-release-signed.apk) immer die aktuelle App liefert.
#
# Variant 'prod' → twa-manifest.json (rookhub.oberschmid.homes, Play-Store-App)
# Variant 'dev'  → twa-manifest.dev.json (rookhub-dev.oberschmid.homes,
#                                          separater packageId, parallel installierbar)
#
# Benötigte Repository-Secrets:
#   ANDROID_KEYSTORE_BASE64    - base64 -w0 android.keystore
#   ANDROID_KEYSTORE_PASSWORD  - Keystore-Passwort
#   ANDROID_KEY_PASSWORD       - Schlüssel-Passwort (Alias: rookhub)

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant (prod = Play Store, dev = rookhub-dev.oberschmid.homes)'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

jobs:
  build:
    runs-on: ubuntu-latest
    # Release-Publish (prod) braucht Schreibrechte auf Contents/Releases.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Select manifest variant
        working-directory: twa
        run: |
          if [ "${{ inputs.variant }}" = "dev" ]; then
            echo "Using dev manifest (rookhub-dev.oberschmid.homes)"
            cp twa-manifest.dev.json twa-manifest.json
          else
            echo "Using prod manifest (rookhub.oberschmid.homes)"
          fi
          cat twa-manifest.json | head -20

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # Android SDK bereitstellen + Lizenzen akzeptieren.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: true

      - name: Install required Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # Pflicht: Bubblewrap erkennt JDK/SDK NICHT automatisch (auch nicht ueber
      # JAVA_HOME/ANDROID_HOME) und fragt sonst interaktiv "Do you want Bubblewrap
      # to install the JDK?" -> in der CI (kein TTY) bricht das mit Exit 130 ab.
      # Mit vorab geschriebener config.json nutzt es das vorhandene JDK + SDK.
      - name: Configure Bubblewrap (use preinstalled JDK + SDK)
        run: |
          mkdir -p "$HOME/.bubblewrap"
          cat > "$HOME/.bubblewrap/config.json" <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_SDK_ROOT}"
          }
          EOF
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - name: Restore signing keystore
        working-directory: twa
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android.keystore

      - name: Generate Android project from manifest
        working-directory: twa
        run: bubblewrap update --skipVersionUpgrade

      - name: Build signed AAB
        working-directory: twa
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: Upload AAB + APK
        uses: actions/upload-artifact@v7
        with:
          name: rookhub-android-${{ inputs.variant }}
          path: |
            twa/app-release-bundle.aab
            twa/app-release-signed.apk
          if-no-files-found: warn

      # Nur prod: App-Version aus changelog.ts lesen (Single Source, siehe CLAUDE.md).
      - name: Read app version
        if: inputs.variant == 'prod'
        id: ver
        run: |
          v=$(grep -oE "APP_VERSION = '[0-9.]+'" src/frontend/app/src/environments/changelog.ts | grep -oE "[0-9]+\.[0-9]+\.[0-9]+")
          if [ -z "$v" ]; then echo "APP_VERSION nicht gefunden"; exit 1; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "App version: $v"

      # Nur prod: frische APK/AAB an ein GitHub-Release hängen + als "latest" markieren,
      # damit releases/latest/download/app-release-signed.apk immer die aktuelle App liefert.
      - name: Publish GitHub Release with fresh APK
        if: inputs.variant == 'prod'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: RookHub ${{ steps.ver.outputs.version }}
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            RookHub Android-App v${{ steps.ver.outputs.version }}.

            - `app-release-signed.apk` — Direkt-Download für /install
            - `app-release-bundle.aab` — Play-Store-Bundle
          files: |
            twa/app-release-signed.apk
            twa/app-release-bundle.aab
