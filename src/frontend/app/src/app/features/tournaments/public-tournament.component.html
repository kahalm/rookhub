    @if (loading) {
      <app-loading-spinner />
    } @else if (tournament) {
      <div class="detail-container">
        <mat-card>
          <mat-card-header>
            <mat-card-title>{{ tournament.name }}</mat-card-title>
            <mat-card-subtitle>{{ subtitle }}</mat-card-subtitle>
          </mat-card-header>
          <mat-card-actions class="action-bar">
            <a mat-raised-button [href]="'https://chess-results.com/tnr' + tournament.chessResultsId + '.aspx?lan=0'" target="_blank" rel="noopener noreferrer">
              <mat-icon>open_in_new</mat-icon><span class="btn-label"> {{ 'tournaments.actions.chessResults' | translate }}</span>
            </a>
            <button mat-raised-button (click)="share()">
              <mat-icon>share</mat-icon><span class="btn-label"> {{ 'tournaments.actions.share' | translate }}</span>
            </button>
          </mat-card-actions>
        </mat-card>

        <app-tournament-tables
          [players]="players"
          [teams]="teams"
          [displayedPlayers]="displayedPlayers"
          [displayedTeams]="displayedTeams"
          [displayedPairings]="displayedPairings"
          [playerColumns]="playerColumns"
          [teamColumns]="teamColumns"
          [pairingColumns]="pairingColumns"
          [playersLoading]="playersLoading"
          [teamsLoading]="teamsLoading"
          [pairingsLoading]="pairingsLoading"
          [hasFavorites]="hasFavorites"
          [showFavoritesOnly]="showFavoritesOnly"
          [favoriteSnrs]="favoriteSnrs"
          [favoriteTeamSnrs]="favoriteTeamSnrs"
          [hasTeamPairings]="hasTeamPairings"
          [rounds]="rounds"
          [selectedRound]="selectedRound"
          [selectedTabIndex]="selectedTabIndex"
          (tabChange)="onTabChange($event)"
          (favoritesToggle)="onFavoritesToggle($event)"
          (playerSort)="playerSort = $event"
          (teamSort)="teamSort = $event"
          (pairingSort)="pairingSort = $event"
          (roundChange)="onRoundChange($event)"
          (toggleFavorite)="toggleFavorite($event)"
          (toggleTeamFavorite)="toggleTeamFavorite($event)"
          (showTeamPlayers)="showTeamPlayers($event)">
        </app-tournament-tables>
      </div>
    } @else {
      <div class="detail-container">
        <mat-card>
          <mat-card-content>
            <p>{{ 'tournaments.public.notFound' | translate }}</p>
          </mat-card-content>
        </mat-card>
      </div>
    }
