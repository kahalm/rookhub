<div class="tab-content">
  <h2>{{ 'admin.puzzles.title' | translate }}</h2>
  <mat-card>
    <mat-card-content>
      <p>{{ 'admin.puzzles.backfillHint' | translate }}</p>
      <button mat-raised-button color="primary" (click)="backfillPuzzleTags()" [disabled]="puzzleTagsBackfilling">
        <mat-icon>sync</mat-icon>
        {{ (puzzleTagsBackfilling ? 'admin.puzzles.backfillRunning' : 'admin.puzzles.backfillBtn') | translate }}
      </button>
    </mat-card-content>
  </mat-card>
</div>
