<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RookHub</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#3f51b5">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
  <script>
    // Faengt das PWA-Install-Event ab, falls es vor dem Angular-Bootstrap feuert.
    // PwaInstallService liest window.__rookhubInstallPrompt beim Start aus, damit
    // die Installationsseite (/install) den nativen Installieren-Button anbieten kann.
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.__rookhubInstallPrompt = e;
    });
  </script>
</body>
</html>
