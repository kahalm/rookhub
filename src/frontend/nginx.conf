# Cache-Control je URI-Klasse (SW-Härtung): index.html ging bisher OHNE Cache-Control raus →
# Browser/Zwischen-Proxys durften heuristisch cachen. Der ngsw validiert Assets per Hash gegen
# ngsw.json; eine stale ausgelieferte index.html/Chunk ⇒ Hash-Mismatch ⇒ ganze App-Version
# invalidiert ⇒ degraded (EXISTING_CLIENTS_ONLY/SAFE_MODE) — der dokumentierte Haupt-Vektor
# (angular.dev/ecosystem/service-workers/devops: „intermediate caching layers").
# Als map statt location-add_header, weil ein add_header IN einer location die server-weiten
# Security-Header (CSP!) NICHT mehr erben würde. Leerer map-Wert ⇒ nginx setzt den Header nicht
# (z. B. API-/OG-Proxy-Antworten bleiben unberührt).
# Reihenfolge: bei Regex-Einträgen gewinnt der ERSTE Treffer — SW-Steuerdateien vor der
# generischen JS-Regel.
map $uri $rookhub_cache_control {
    default "";
    # SW-Steuerdateien: nie cachen (wie bisher; safety-worker = Kill-Switch-Reserve).
    ~^/(ngsw-worker\.js|ngsw\.json|safety-worker\.js|worker-basic\.min\.js)$  "no-cache, no-store, must-revalidate";
    # Stabil benannte, aber in ngsw.json hash-getrackte Dateien: immer revalidieren (ETag ⇒ 304).
    ~^/(index\.html|manifest\.webmanifest|favicon\.ico|build-info\.json|pwa-install-hook\.js)$  "no-cache, must-revalidate";
    ~^/(i18n|assets|board|piece|icons)/  "no-cache, must-revalidate";
    # Hash-benannte Build-Artefakte: unveränderlich ⇒ 1 Jahr immutable (entlastet Update-Downloads).
    "~^/(main|polyfills|chunk|styles|scripts|worker)-[A-Za-z0-9_-]{6,}\.(js|mjs|css)$"  "public, max-age=31536000, immutable";
    ~^/media/  "public, max-age=31536000, immutable";
}

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Cache-Politik aus der map oben; always = auch auf Fehler-Antworten.
    add_header Cache-Control $rookhub_cache_control always;

    # S-21: Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # connect-src enthaelt die Google-Fonts-Origins, damit der Service Worker sie
    # fuer den Offline-Betrieb cachen darf (sonst zeigen Material-Icons offline nur Text).
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;" always;

    # WASM MIME type
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        default_type application/wasm;
    }

    # (Die frühere SW-Sonder-location ist in der $rookhub_cache_control-map aufgegangen —
    #  dadurch erben die SW-Dateien jetzt auch wieder ALLE Security-Header.)

    # RookHub API
    location /api/ {
        # Upstream zur Laufzeit ueber Dockers internen DNS aufloesen, statt
        # fest beim Start. Verhindert "[emerg] host not found in upstream api",
        # wenn der api-Container beim (Re)Start noch nicht im DNS registriert
        # ist. Die Variable im proxy_pass ist der Schalter dafuer; resolver
        # nennt nginx den DNS-Server, valid cacht das Ergebnis kurz.
        resolver 127.0.0.11 valid=30s;
        set $rookhub_api api:8080;
        proxy_pass http://$rookhub_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 15M;
    }

    # Digital Asset Links fuer die Android-TWA (Google Play) — verifiziert Domain<->App.
    # Datei liegt in public/.well-known/; SHA-256-Fingerprint vor dem Release eintragen.
    location = /.well-known/assetlinks.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Link-Vorschau (Open Graph / Twitter Card): die OEFFENTLICHEN Routen (geteilte Partie /g/,
    # Turnier /t/, Puzzles /puzzles/) gehen an den OG-Renderer der API. Der holt die echte index.html
    # (dieser nginx) und reichert sie mit stellungsspezifischen Meta-Tags an — Menschen bekommen die
    # normale SPA (die Bootstrap-Scripts bleiben unveraendert), Crawler lesen die Tags. Der Original-
    # Pfad wird per X-Original-URI durchgereicht. Muss VOR dem SPA-Fallback stehen.
    location ~ ^/(g|t|puzzles)(/|$) {
        resolver 127.0.0.11 valid=30s;
        set $rookhub_og_api api:8080;
        proxy_pass http://$rookhub_og_api/api/og/render;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        # Schlägt der OG-Renderer fehl (API down/Fehler/nicht erreichbar), NICHT die Fehlerseite
        # ausliefern, sondern die normale SPA — die Vorschau-Anreicherung entfällt dann nur.
        proxy_intercept_errors on;
        proxy_connect_timeout 3s;
        error_page 500 502 503 504 = @og_fallback;
    }

    # Fallback: normale SPA-index.html ohne Meta-Anreicherung.
    location @og_fallback {
        try_files /index.html =404;
    }

    # Angular SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
