server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # S-21: Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self';" always;

    # WASM MIME type
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        default_type application/wasm;
    }

    # RookHub API
    location /api/ {
        # Upstream zur Laufzeit ueber Dockers internen DNS aufloesen, statt
        # fest beim Start. Verhindert "[emerg] host not found in upstream api",
        # wenn der api-Container beim (Re)Start noch nicht im DNS registriert
        # ist. Die Variable im proxy_pass ist der Schalter dafuer; resolver
        # nennt nginx den DNS-Server, valid cacht das Ergebnis kurz.
        resolver 127.0.0.11 valid=30s;
        set $rookhub_api api:8080;
        proxy_pass http://$rookhub_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 15M;
    }

    # Angular SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
