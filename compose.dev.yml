###############################################################################
# RookHub full-stack local development (ohne Gluetun/VPN)
#
#   docker compose -f compose.dev.yml --env-file .env.dev up --build
###############################################################################

services:

  # ── Shared MariaDB ─────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: rookhub-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD must be set}
      CRAWLER_DB_NAME: ${CRAWLER_DB_NAME}
      CRAWLER_DB_USER: ${CRAWLER_DB_USER}
      CRAWLER_DB_PASSWORD: ${CRAWLER_DB_PASSWORD}
      ROOKHUB_DB_NAME: ${ROOKHUB_DB_NAME}
      ROOKHUB_DB_USER: ${ROOKHUB_DB_USER}
      ROOKHUB_DB_PASSWORD: ${ROOKHUB_DB_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rookhub

  # ── ChessResults Crawler (ohne VPN) ────────────────────────────────────────
  crawler:
    build:
      context: ../chessreslults_crawler/src/ChessResultsCrawler
      dockerfile: Dockerfile
    container_name: rookhub-crawler
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=mariadb;Port=3306;Database=${CRAWLER_DB_NAME};User=${CRAWLER_DB_USER};Password=${CRAWLER_DB_PASSWORD};"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    networks:
      - rookhub

  # ── RookHub API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./src/api/RookHub.Api
      dockerfile: Dockerfile
    container_name: rookhub-api
    restart: unless-stopped
    ports:
      - "${API_PORT}:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      crawler:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: "Server=mariadb;Port=3306;Database=${ROOKHUB_DB_NAME};User=${ROOKHUB_DB_USER};Password=${ROOKHUB_DB_PASSWORD};"
      Jwt__Key: ${JWT_KEY:?JWT_KEY must be set}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Crawler__BaseUrl: http://crawler:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    networks:
      - rookhub

  # ── Frontend (Angular + nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: rookhub-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api
    networks:
      - rookhub

networks:
  rookhub:

volumes:
  mariadb-data:
