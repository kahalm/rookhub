###############################################################################
# RookHub full-stack local development (ohne Gluetun/VPN)
#
#   docker compose -f compose.dev.yml --env-file .env.dev up --build
###############################################################################

services:

  # ── Shared MariaDB ─────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: rookhub-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD must be set}
      CRAWLER_DB_NAME: ${CRAWLER_DB_NAME}
      CRAWLER_DB_USER: ${CRAWLER_DB_USER}
      CRAWLER_DB_PASSWORD: ${CRAWLER_DB_PASSWORD}
      ROOKHUB_DB_NAME: ${ROOKHUB_DB_NAME}
      ROOKHUB_DB_USER: ${ROOKHUB_DB_USER}
      ROOKHUB_DB_PASSWORD: ${ROOKHUB_DB_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rookhub

  # ── ChessResults Crawler (ohne VPN) ────────────────────────────────────────
  crawler:
    build:
      context: ../chessresults_crawler/src/ChessResultsCrawler
      dockerfile: Dockerfile
    container_name: rookhub-crawler
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=mariadb;Port=3306;Database=${CRAWLER_DB_NAME};User=${CRAWLER_DB_USER};Password=${CRAWLER_DB_PASSWORD};"
      API_KEY: ${CRAWLER_API_KEY}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Elasticsearch__Url: http://elasticsearch:9200
    networks:
      - rookhub

  # ── RookHub API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./src/api/RookHub.Api
      dockerfile: Dockerfile
    container_name: rookhub-api
    restart: unless-stopped
    ports:
      - "${API_PORT}:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      crawler:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=mariadb;Port=3306;Database=${ROOKHUB_DB_NAME};User=${ROOKHUB_DB_USER};Password=${ROOKHUB_DB_PASSWORD};"
      Jwt__Key: ${JWT_KEY:?JWT_KEY must be set}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Crawler__BaseUrl: http://crawler:8080
      Crawler__ApiKey: ${CRAWLER_API_KEY}
      Discord__LinkSecret: ${DISCORD_LINK_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Elasticsearch__Url: http://elasticsearch:9200
    volumes:
      - dataprotection-keys:/keys
    networks:
      - rookhub

  # ── Frontend (Angular + nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: rookhub-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:8080"
    depends_on:
      - api
    networks:
      - rookhub

  # ── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: rookhub-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=rookhub-logs
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rookhub

  # ── Kibana ────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: rookhub-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - rookhub

  # ── Kibana Data Views Init (idle sidecar — bleibt running fuer Arcane) ────
  kibana-init:
    image: curlimages/curl:latest
    container_name: rookhub-kibana-init
    restart: unless-stopped
    depends_on:
      kibana:
        condition: service_healthy
    volumes:
      - ./init-kibana.sh:/init-kibana.sh:ro
    # Init laeuft bei jedem Start (idempotent), danach idle -> Container bleibt "running"
    entrypoint: ["/bin/sh", "-c", "/init-kibana.sh; echo 'init done, idling'; exec tail -f /dev/null"]
    networks:
      - rookhub

networks:
  rookhub:

volumes:
  mariadb-data:
  es-data:
  dataprotection-keys:
